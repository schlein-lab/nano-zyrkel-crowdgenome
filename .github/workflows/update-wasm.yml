name: "nano-zyrkel: Update WASM Core"

on:
  workflow_dispatch:
    inputs:
      wasm_tag:
        description: "WASM release tag (e.g. wasm-v0.2.0)"
        required: true
        default: "wasm-v0.2.0"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM core
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release download "${{ inputs.wasm_tag }}" \
            -R schlein-lab/nano-zyrkel \
            -p "wasm-data.zip" --clobber
          unzip -o wasm-data.zip -d docs/wasm/
          rm wasm-data.zip

      - name: Commit
        run: |
          git config user.name "nano-zyrkel"
          git config user.email "nano@zyrkel.local"
          git add docs/wasm/
          git diff --staged --quiet || \
            git commit -m "wasm-core: update to ${{ inputs.wasm_tag }}"
          git push
