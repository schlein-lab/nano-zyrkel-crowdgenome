name: "nano-zyrkel: CrowdGenome Pipeline"

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get nano-zyrkel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download bin-v0.3.0 -R schlein-lab/nano-zyrkel \
            -p "nano-zyrkel-x86_64-unknown-linux-gnu.tar.gz" --clobber
          tar xzf nano-zyrkel-x86_64-unknown-linux-gnu.tar.gz
          chmod +x nano-zyrkel

      - name: Execute pipeline
        run: ./nano-zyrkel --config hats/config.json --lang en

      - name: Commit
        run: |
          git config user.name "nano-zyrkel"
          git config user.email "nano@zyrkel.local"
          git add staging/
          git diff --staged --quiet || \
            git commit -m "crowdgenome $(date -u +%Y-%m-%dT%H:%M)"
          git push || true
